<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0520a" />
      <stop offset="100%" stop-color="#8c3205" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f0eb" />
      <stop offset="100%" stop-color="#d5cfc9" />
    </linearGradient>
  </defs>
  <!-- Background with subtle glow/border -->
  <rect width="500" height="500" x="6" y="6" rx="130" fill="#0d0d0d" stroke="url(#orangeGrad)" stroke-width="12" />
  <!-- Monogram Text "AVR" -->
  <text 
    x="50%" 
    y="53%" 
    font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif" 
    font-weight="900" 
    font-size="200" 
    fill="url(#textGrad)" 
    text-anchor="middle" 
    dominant-baseline="middle"
    letter-spacing="-4"
  >AVR</text>
  <!-- Accent dot -->
  <circle cx="395" cy="335" r="18" fill="url(#orangeGrad)" />
</svg>